name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: |
            --allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*)"

          prompt: |
            Estás haciendo triaje automático de un issue de GitHub en el repositorio
            de un juego de Tetris (HTML/CSS/JS puro, sin framework ni build step).
            El issue a analizar es el número ${{ github.event.issue.number }}.

            Contexto del proyecto (de CLAUDE.md):
            - `index.html`: estructura DOM, canvas del tablero y de la pieza siguiente,
              panel lateral, overlay de pausa/game over.
            - `style.css`: estética retro/oscura, `.hidden` controla visibilidad.
            - `game.js` (~305 líneas): toda la lógica del juego como funciones puras
              sobre variables de estado a nivel de módulo (`board`, `current`, `next`,
              `score`, `lines`, `level`, `paused`, `gameOver`, etc). Sin clases.
              Flujo principal: `init() → spawn() → loop() → lockPiece() → merge() →
              clearLines() → spawn()`. Wall kicks en `tryRotate()`. Ghost piece en
              `ghostY()`. Fórmula de velocidad y puntuación en `dropInterval` y
              `LINE_SCORES`.

            Pasos a seguir:

            1. Lee el issue actual con:
               `gh issue view ${{ github.event.issue.number }} --json title,body,labels`

            2. Asegura que existan estos labels en el repo (créalos si faltan, usando
               `gh label create "<nombre>" --color <hex> --description "<desc>" --force`,
               que es idempotente):

               Tipo:
               - type/bug (color d73a4a) — error o comportamiento incorrecto
               - type/feature (color a2eeef) — nueva funcionalidad
               - type/enhancement (color 84b6eb) — mejora de algo existente
               - type/question (color d876e3) — duda o consulta
               - type/docs (color 0075ca) — documentación

               Área:
               - area/gameplay (color c5def5) — lógica de juego (spawn, lock,
                 colisiones, line clear)
               - area/rendering (color c5def5) — dibujo en canvas (draw, ghost piece)
               - area/ui (color c5def5) — overlay, panel lateral, estilos
               - area/scoring (color c5def5) — puntuación/niveles/velocidad
               - area/controls (color c5def5) — entrada de teclado/rotación

               Prioridad:
               - priority/high (color e11d21)
               - priority/medium (color fbca04)
               - priority/low (color 0e8a16)

            3. Basándote en el título y cuerpo del issue, elige al menos un label
               `type/*` y, cuando aplique, uno o más `area/*` y un `priority/*`.
               Aplica esos labels con:
               `gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2,..."`
               No quites labels que ya estén puestos manualmente por una persona,
               salvo que sean claramente incorrectos según el contenido del issue.

            4. Publica un comentario en español con el diagnóstico general usando
               `gh issue comment ${{ github.event.issue.number }} --body "..."`,
               con esta estructura (usa Markdown):

               ## Diagnóstico automático

               **Resumen**: reformulación breve del problema o petición.

               **Análisis**: qué está pasando y por qué, relacionándolo con la
               arquitectura del juego cuando sea posible.

               **Archivos/áreas probables**: archivos y funciones concretas de
               `game.js`, `index.html` o `style.css` que probablemente haya que tocar.

               **Enfoque de solución propuesto**: pasos de alto nivel para implementar
               el fix o la funcionalidad, sin escribir el código todavía.

               **Preguntas abiertas**: si falta información para diagnosticar con
               certeza, indícalo aquí.

               Sé conciso pero específico. Este diagnóstico se usará después para
               implementar la solución, así que prioriza utilidad práctica sobre
               extensión.

            No modifiques el cuerpo original del issue, no cierres el issue, y no
            hagas cambios de código en este workflow: solo labels y el comentario de
            diagnóstico.
