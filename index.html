<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar a modo claro" title="Cambiar tema">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Pantalla de inicio -->
    <div id="start-overlay" class="overlay">
      <div class="overlay-box start-box">
        <p class="start-title">TOP 5</p>
        <div id="start-records" class="records-container"></div>
        <button id="play-btn" class="btn-primary">Jugar</button>
        <button id="reset-records-start-btn" class="btn-secondary">Resetear récords</button>
      </div>
    </div>

    <!-- Overlay de pausa / game over -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Entrada de nombre (solo en game over si entra al Top 5) -->
        <div id="name-entry" class="name-entry hidden">
          <p class="new-record-label">¡Nuevo récord!</p>
          <div class="name-entry-row">
            <input id="name-input" type="text" maxlength="12" placeholder="Tu nombre" />
            <button id="save-record-btn" class="btn-primary">Guardar</button>
          </div>
        </div>

        <!-- Tabla de récords en game over -->
        <div id="go-records" class="records-container hidden"></div>

        <button id="restart-btn" class="btn-primary">Reiniciar</button>
        <button id="reset-records-go-btn" class="btn-secondary hidden">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
