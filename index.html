<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar a modo claro" title="Cambiar tema">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="name-entry hidden">
          <input type="text" id="name-input" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="submit-score-btn">Guardar</button>
        </div>

        <div class="highscores">
          <span class="label">TOP 5</span>
          <ol id="highscore-list" class="highscore-list"></ol>
          <p id="bests-line" class="bests-line"></p>
        </div>

        <div class="overlay-actions">
          <button id="restart-btn">Reiniciar</button>
          <button id="reset-scores-btn" class="secondary-btn">Borrar récords</button>
        </div>
      </div>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>

        <div class="highscores">
          <span class="label">TOP 5</span>
          <ol id="start-highscore-list" class="highscore-list"></ol>
          <p id="start-bests-line" class="bests-line"></p>
        </div>

        <div class="overlay-actions">
          <button id="play-btn">Jugar</button>
          <button id="start-reset-scores-btn" class="secondary-btn">Borrar récords</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
